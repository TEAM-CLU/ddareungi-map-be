<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>따릉이맵</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <script
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=__KAKAO_MAP_API__&autoload=false&libraries=services,clusterer"></script>

    <script src="/myLocation.js"></script>
    <script src="/routing.js"></script>
    <script src="/navigation.js"></script>
    <script src="/search.js"></script>
    <script src="/station.js"></script>
    <script src="/bookmark.js"></script>

    <script>
      // 최소 동작용 초기화(기존 public/*.js 모듈들이 kakao/map 전역을 기대하는 구조를 최대한 유지)
      window.addEventListener('DOMContentLoaded', () => {
        if (!window.kakao || !window.kakao.maps) {
          console.error('Kakao maps SDK not loaded');
          return;
        }

        kakao.maps.load(() => {
          const DEFAULT_LAT = 37.5665;
          const DEFAULT_LNG = 126.978;
          const container = document.getElementById('map');
          const map = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(DEFAULT_LAT, DEFAULT_LNG),
            level: 5,
          });

          try {
            // 각 모듈이 존재하면 초기화(방어적)
            window.MyLocation?.initMyLocationSetting?.(
              kakao,
              map,
              DEFAULT_LAT,
              DEFAULT_LNG,
            );
            window.Route?.initRouteSetting?.(kakao, map, DEFAULT_LAT, DEFAULT_LNG);
            window.Navigation?.initNavigationSetting?.(
              kakao,
              map,
              DEFAULT_LAT,
              DEFAULT_LNG,
            );
            window.Search?.initSearchSetting?.(kakao, map);
            window.Station?.initStationSeting?.(kakao, map);
            window.Bookmark?.initBookmarkSetting?.(kakao, map);
          } catch (e) {
            console.error('Map init error:', e);
          }
        });
      });
    </script>
  </body>

</html>
