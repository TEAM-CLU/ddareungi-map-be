<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>따릉이맵 로그인 결과</title>
    <style>
      :root {
        --primary: #00C897;
        --error: #FF4D4F;
        --bg: #F5F7FA;
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--bg);
        font-family: sans-serif;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
        width: 85%;
        max-width: 360px;
      }

      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: bold;
      }

      p {
        color: #666;
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: var(--primary);
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div id="icon" class="icon">⌛</div>
      <h2 id="title">처리 중...</h2>
      <p id="message">잠시만 기다려주세요.</p>
      <a href="#" onclick="window.close()" class="btn">창 닫기</a>
    </div>

    <script>
      // URL fragment(#...) 우선 파싱, 없으면 query 파싱(하위 호환)
      const frag = window.location.hash?.startsWith('#')
        ? window.location.hash.slice(1)
        : '';
      const query = window.location.search?.startsWith('?')
        ? window.location.search.slice(1)
        : '';
      const params = new URLSearchParams(frag || query);

      const status = params.get('status') || 'error';
      const state = params.get('state');
      const provider = (params.get('provider') || '').toLowerCase();
      const errorCode = params.get('errorCode');
      const errorMessage = params.get('errorMessage');

      const iconEl = document.getElementById('icon');
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');

      const providerKo =
        provider === 'google'
          ? '구글'
          : provider === 'kakao'
            ? '카카오'
            : provider === 'naver'
              ? '네이버'
              : '소셜';

      const errorMessageByCode = {
        USER_CANCEL: '로그인을 취소하셨습니다.',
        AUTH_TIMEOUT: '인증 시간이 만료되었습니다. 다시 시도해 주세요.',
        INVALID_STATE: '비정상적인 접근입니다.',
        PKCE_VERIFY_FAIL: '로그인 처리 중 기술적 오류가 발생했습니다.',
        INTERNAL_ERROR: '서버 점검 중입니다. 잠시 후 이용해 주세요.',
      };

      if (status === 'success') {
        iconEl.innerText = '✅';
        iconEl.style.color = '#00C897';
        titleEl.innerText = '로그인 성공!';
        messageEl.innerText = `${providerKo} 로그인이 완료되었습니다.`;

        // 앱(WebView)으로 데이터 전달
        if (window.ReactNativeWebView) {
          const upper = provider ? provider.toUpperCase() : 'SOCIAL';
          window.ReactNativeWebView.postMessage(
            JSON.stringify({
              type: `${upper}_LOGIN_SUCCESS`,
              provider,
              status: 'success',
              state,
            }),
          );
        }
      } else {
        iconEl.innerText = '❌';
        iconEl.style.color = '#FF4D4F';
        titleEl.innerText = '로그인 실패';
        const detail =
          (errorCode && errorMessageByCode[errorCode]) ||
          '인증 처리 중 오류가 발생했습니다.\n다시 시도해주세요.';
        messageEl.innerText = detail;

        if (window.ReactNativeWebView) {
          const upper = provider ? provider.toUpperCase() : 'SOCIAL';
          window.ReactNativeWebView.postMessage(
            JSON.stringify({
              type: `${upper}_LOGIN_ERROR`,
              provider,
              status: 'error',
              errorCode: errorCode || 'unknown',
              // UI에는 노출하지 않되, RN에서 디버깅/분기용으로만 전달
              errorMessage: errorMessage || undefined,
            }),
          );
        }
      }

      // 3초 후 자동 창 닫기 시도
      setTimeout(() => {
        if (window.close) window.close();
      }, 3000);
    </script>
  </body>

</html>
