<!DOCTYPE html>
<html lang="ko">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>따릉이맵 로그인 결과</title>
    <style>
      :root {
        --primary: #00C897;
        --error: #FF4D4F;
        --bg: #F5F7FA;
      }

      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--bg);
        font-family: sans-serif;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
        width: 85%;
        max-width: 360px;
      }

      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: bold;
      }

      p {
        color: #666;
        font-size: 16px;
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: var(--primary);
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div id="icon" class="icon">⌛</div>
      <h2 id="title">처리 중...</h2>
      <p id="message">잠시만 기다려주세요.</p>
      <!-- JS가 차단/미실행이어도 최소한 이동 가능하도록 href를 둠 -->
      <a href="/" id="closeBtn" class="btn">창 닫기</a>
    </div>

    <!-- 캐시/프록시가 오래된 JS를 주는 경우 방어용 버전 쿼리 -->
    <script src="/auth_result.js?v=1" defer></script>
  </body>

</html>
