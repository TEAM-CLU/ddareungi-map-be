name: DDareungiMap BE CI/CD (Docker)

on:
  push:
    branches:
      - dev

concurrency:
  # 같은 브랜치 푸시가 연속될 때 중간 빌드 취소
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # 빌드는 EC2 컨테이너 안에서 수행하므로 여기선 소스/구성 파일만 EC2로 전송
      - name: Transfer source to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # 도커 이미지 빌드 컨텍스트에 필요한 모든 파일
          source: 'src,public,package.json,pnpm-lock.yaml,tsconfig.json,tsconfig.build.json,nest-cli.json,Dockerfile,.dockerignore,docker-compose.yml'
          target: '/home/ubuntu/ddareungi-map-be'

      - name: Build & Reload via Docker Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          # 무중단에 가까운 재기동:
          #  - nestjs 이미지만 새로 빌드
          #  - --no-deps: redis/graphhopper는 건드리지 않음
          #  - --force-recreate: 새 이미지로 컨테이너 교체 (헬스체크 통과 시까지 대기)
          script: |
            set -euo pipefail
            cd /home/ubuntu/ddareungi-map-be

            # 디스크 안전장치 (1GB 미만이면 빌드 거부)
            AVAIL_KB=$(df -k / | awk 'NR==2 {print $4}')
            if [ "$AVAIL_KB" -lt 1048576 ]; then
              echo "ERROR: insufficient disk (<1GB free). aborting build."; df -h /; exit 1
            fi

            # 빌드 → 교체 → 미사용 이미지 정리
            docker compose build nestjs
            docker compose up -d --no-deps --force-recreate nestjs

            # 30초간 헬스체크 통과 대기 (실패 시 비정상 종료)
            for i in $(seq 1 30); do
              if [ "$(docker inspect -f '{{.State.Health.Status}}' ddareungimap-api 2>/dev/null)" = "healthy" ]; then
                echo "nestjs healthy"; break
              fi
              sleep 2
              if [ "$i" -eq 30 ]; then
                echo "ERROR: nestjs unhealthy after 60s"; docker logs --tail 80 ddareungimap-api; exit 1
              fi
            done

            docker image prune -f
