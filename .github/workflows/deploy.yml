name: DDareungiMap BE CI/CD (SSM Deploy)

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ddareungimap-deploy-artifacts-586110264746
  EC2_INSTANCE_ID: i-0349ea5cf82643001
  REMOTE_APP_DIR: /home/ubuntu/ddareungi-map-be

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package source artifact
        run: |
          set -euo pipefail
          ARTIFACT="deploy-${GITHUB_SHA::8}-${{ github.run_id }}.tar.gz"
          tar -czf "$ARTIFACT" \
            src public package.json pnpm-lock.yaml \
            tsconfig.json tsconfig.build.json nest-cli.json \
            Dockerfile .dockerignore docker-compose.yml \
            scripts/deploy-on-ec2.sh
          ls -lh "$ARTIFACT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload to S3
        run: |
          aws s3 cp "$ARTIFACT" "s3://$S3_BUCKET/$ARTIFACT" \
            --metadata "git-sha=${{ github.sha }},triggered-by=${{ github.actor }}"

      - name: Trigger deploy on EC2 via SSM
        id: ssm
        run: |
          set -euo pipefail
          # SSM 기본 셸은 dash라 pipefail 미지원 → bash -c로 감싸 실행
          INNER="set -euo pipefail; cd /tmp; aws s3 cp \"s3://${S3_BUCKET}/${ARTIFACT}\" \"${ARTIFACT}\"; mkdir -p \"${REMOTE_APP_DIR}\"; tar -xzf \"${ARTIFACT}\" -C \"${REMOTE_APP_DIR}\"; rm -f \"${ARTIFACT}\"; chown -R ubuntu:ubuntu \"${REMOTE_APP_DIR}\"; ARTIFACT=\"${ARTIFACT}\" S3_BUCKET=\"${S3_BUCKET}\" APP_DIR=\"${REMOTE_APP_DIR}\" bash \"${REMOTE_APP_DIR}/scripts/deploy-on-ec2.sh\""
          SCRIPT="bash -c $(printf '%q' "$INNER")"

          # jq로 JSON 안전 빌드 ({"commands":["..."]})
          PARAMS=$(jq -nc --arg cmd "$SCRIPT" '{commands:[$cmd]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${GITHUB_SHA::8} by ${{ github.actor }}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)

          echo "CommandId=$CMD_ID"
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy result
        run: |
          set -euo pipefail
          CMD_ID="${{ steps.ssm.outputs.command_id }}"
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo InProgress)
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success) echo "DEPLOY OK"; exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "=== STDERR ==="
                aws ssm get-command-invocation --command-id "$CMD_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query StandardErrorContent --output text || true
                echo "=== STDOUT ==="
                aws ssm get-command-invocation --command-id "$CMD_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query StandardOutputContent --output text || true
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "ERROR: SSM command timeout (7.5min)"
          exit 1

      - name: Print deploy stdout
        if: always() && steps.ssm.outputs.command_id != ''
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query StandardOutputContent --output text 2>/dev/null | tail -50 || true
